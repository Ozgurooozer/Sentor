name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── TypeScript & frontend ──────────────────────────────────────────────────
  frontend:
    name: Frontend (TypeScript + pnpm)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ide
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ide/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm audit --audit-level=high || true   # report but don't fail yet

  # ── Rust ──────────────────────────────────────────────────────────────────
  rust:
    name: Rust (cargo)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ide/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ide/src-tauri
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo build
      - run: cargo test

  # ── Python ────────────────────────────────────────────────────────────────
  python:
    name: Python (api + tools)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run API tests
        run: python tools/test_api.py
