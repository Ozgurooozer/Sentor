name: CI

on:
  push:
    branches: [main, v3]
  pull_request:
    branches: [main, v3]

jobs:
  # ── TypeScript & frontend ──────────────────────────────────────────────────
  frontend:
    name: Frontend (TypeScript + pnpm)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ide
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ide/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm run lint
      - run: pnpm audit --audit-level=critical   # critical: fail; high: warn only

  # ── Rust (check + lint only — cargo build needs WebView2 runtime) ─────────
  rust:
    name: Rust (cargo check + clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ide/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ide/src-tauri
      - run: cargo fmt --check
      - run: cargo check --all-targets
      - run: cargo clippy --all-targets -- -D warnings
      # NOTE: cargo build and cargo test are NOT run here.
      # WebView2Loader.dll is unavailable on Linux runners → linker failure.
      # Full release build runs on windows-latest in release.yml (tag pushes only).

  # ── Python ────────────────────────────────────────────────────────────────
  python:
    name: Python (api + tools)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run API tests
        run: python tests/test_api.py
