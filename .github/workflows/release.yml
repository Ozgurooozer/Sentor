name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows:
    name: Build & Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ide/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ide/src-tauri

      - name: Install frontend deps
        working-directory: ide
        run: pnpm install --frozen-lockfile

      # Build Tauri app (produces NSIS installer + MSI)
      - name: Build Tauri release
        working-directory: ide
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      # Create GitHub Release and upload artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ide/src-tauri/target/release/bundle/nsis/*.exe
            ide/src-tauri/target/release/bundle/msi/*.msi
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
