<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Sentor — Office</title>
  <meta name="description" content="Sentor agent ofisi — agent builder, durum ve log.">
  <style>
    :root {
      --bg: #0a0a0a; --surface: #111; --elevated: #1a1a1a;
      --border: #2a2a2a; --text: #f5f5f5; --dim: #888; --accent: #5b8def;
    }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif;
           margin: 0; padding: 2rem; max-width: 820px; margin-inline: auto; line-height: 1.55; }
    header { display: flex; align-items: baseline; gap: 1rem;
             border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1.5rem; }
    header h1 { margin: 0; font-size: 1.6rem; }
    .phase { color: var(--accent); font-size: 0.9rem; font-weight: 500; }
    .updated { color: var(--dim); font-size: 0.8rem; margin-left: auto; }
    h2 { font-size: 1.05rem; color: var(--dim); text-transform: uppercase;
         letter-spacing: 0.05em; margin: 1.8rem 0 0.6rem; font-weight: 500; }
    section { margin-bottom: 1rem; }
    .row { border-bottom: 1px solid var(--border); padding: 0.55rem 0;
           display: flex; gap: 0.8rem; align-items: baseline; }
    .row:last-child { border-bottom: none; }
    .ts { color: var(--dim); font-size: 0.78rem; font-variant-numeric: tabular-nums; min-width: 9ch; }
    .tag { color: var(--accent); font-size: 0.78rem; min-width: 8ch; }
    a { color: var(--text); text-decoration: none; border-bottom: 1px solid var(--border); }
    a:hover { border-bottom-color: var(--accent); }
    .empty { color: var(--dim); font-style: italic; padding: 0.4rem 0; }
    .next-action { background: var(--surface); border: 1px solid var(--border);
                   padding: 0.8rem 1rem; border-radius: 4px; }
  </style>
</head>
<body>
<!-- generated:start -->
<header>
  <h1>Sentor</h1>
  <span class="phase">ideation · agent-builder</span>
  <span class="updated">2026-05-20T00:00:00</span>
</header>

<section>
  <h2>Next Action</h2>
  <div class="next-action">Waiting for user to request a new agent build.</div>
</section>

<section>
  <h2>Recent Activity</h2>
  <div class="row"><span class="ts">20T00:00</span><span class="tag">start</span><span>Ofis oluşturuldu (Faz 2 seed).</span></div>
</section>

<section>
  <h2>Open Projects</h2>
  <div class="empty">No active projects.</div>
</section>
<!-- generated:end -->
</body>
</html>
