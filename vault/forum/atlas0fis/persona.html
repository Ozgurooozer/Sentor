<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas0fis — Persona Ofisi</title>
<meta name="description" content="[atlas0fis] Tek persona ofis görünümü: karakter, önyargı, açık görevler, gelişim. config'den render edilir.">
<script src="./config.js"></script>
<style>
  :root{--bg:#0a0a0a;--surface:#111111;--elevated:#1a1a1a;--subtle:#2a2a2a;--mid:#404040;--ink:#f5f5f5;--dim:#888888;--muted:#555555;--accent:#5b8def;--green:#4caf7d;--amber:#d4a853;--purple:#8b7ed8;--red:#e05a5a;--font:system-ui,-apple-system,sans-serif;--mono:ui-monospace,"Cascadia Code",monospace;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--font);line-height:1.6;padding:2rem 1.5rem 4rem;max-width:760px;margin:0 auto}
  a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
  .back{display:inline-block;font-size:.76rem;color:var(--dim);margin-bottom:1.4rem}.back:hover{color:var(--accent)}
  .phead{display:flex;align-items:center;gap:.9rem;border-bottom:1px solid var(--subtle);padding-bottom:1.1rem;margin-bottom:1.3rem}
  .picon{font-size:1.5rem;width:2.6rem;height:2.6rem;display:grid;place-items:center;border:1px solid var(--subtle);border-radius:10px;flex-shrink:0}
  h1{font-size:1.4rem;font-weight:700;line-height:1.15}
  .unvan{font-size:.82rem;color:var(--dim);margin-top:.15rem}
  h2{font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin:1.5rem 0 .55rem}
  .field{background:var(--surface);border:1px solid var(--subtle);border-radius:6px;padding:.7rem .95rem;font-size:.85rem;color:var(--dim);line-height:1.55;margin-bottom:.5rem}
  .field b{color:var(--ink);font-weight:600}
  .quote{font-style:italic;color:var(--ink)}
  .tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.3rem}
  .tag{font-size:.66rem;font-family:var(--mono);padding:.15rem .45rem;border-radius:3px;border:1px solid var(--subtle);color:var(--dim)}
  table{width:100%;border-collapse:collapse;font-size:.8rem;border:1px solid var(--subtle);border-radius:8px;overflow:hidden}
  th,td{text-align:left;padding:.5rem .7rem;border-bottom:1px solid var(--subtle)}
  th{background:var(--elevated);color:var(--muted);font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em}
  tr:last-child td{border-bottom:none}
  .st-Yapılacak{color:var(--amber)}.st-DevamEdiyor{color:var(--accent)}.st-Tamamlandı{color:var(--green)}
  .c-green{color:var(--green)}.c-purple{color:var(--purple)}.c-accent{color:var(--accent)}.c-amber{color:var(--amber)}.c-red{color:var(--red)}.c-dim{color:var(--dim)}
  .empty{color:var(--muted);font-style:italic;font-size:.82rem;padding:.4rem 0}
</style>
</head>
<body>
<a href="index.html" class="back">← Ofise Dön</a>
<div id="root"><div class="empty">Yükleniyor…</div></div>
<script>
(function(){
  function esc(s){var d=document.createElement('div');d.textContent=(s==null?'':String(s));return d.innerHTML;}
  function qp(k){return new URLSearchParams(location.search).get(k);}
  function init(){
    var cfg=window.ATLAS0FIS_CONFIG, root=document.getElementById('root');
    if(!cfg){root.innerHTML='<div class="empty">config.js bulunamadı.</div>';return;}
    var slug=qp('p'); var p=(cfg.personas||[]).find(function(x){return x.slug===slug;});
    if(!p){root.innerHTML='<div class="empty">Persona bulunamadı: '+esc(slug)+'</div>';return;}
    document.title='Atlas0fis — '+p.ad;
    var c='c-'+(p.renk||'dim');
    var tasks=(cfg.board||[]).filter(function(b){return b.owner===slug;});
    var rules=(cfg.rules||[]).map(function(r){return '<span class="tag">'+esc(r)+'</span>';}).join('');
    var taskRows=tasks.length?tasks.map(function(t){
      var st=(t.durum||'').replace(/\s/g,'');
      return '<tr><td><b>'+esc(t.id)+'</b></td><td>'+esc(t.gorev)+'</td><td class="st-'+st+'">'+esc(t.durum)+'</td><td>'+esc(t.oncelik||'')+'</td></tr>';
    }).join(''):'<tr><td colspan="4" class="empty">Bu personaya atanmış görev yok.</td></tr>';

    root.innerHTML=
      '<div class="phead"><span class="picon '+c+'">'+esc(p.icon||'◆')+'</span>'
      +'<div><h1>'+esc(p.ad)+'</h1><div class="unvan">'+esc(p.unvan)+'</div></div></div>'
      +'<h2>Karakter</h2><div class="field">'+esc(p.karakter)+'</div>'
      +'<div class="field"><b>Ses:</b> '+esc(p.ses)+'</div>'
      +'<div class="field"><b>Önyargı:</b> '+esc(p.onyargi)+'</div>'
      +'<div class="field"><b>Tipik soru:</b> <span class="quote">“'+esc(p.sorar)+'”</span></div>'
      +'<h2>Görevleri</h2><table><thead><tr><th>ID</th><th>Görev</th><th>Durum</th><th>Öncelik</th></tr></thead><tbody>'+taskRows+'</tbody></table>'
      +'<h2>Ofis Kuralları (her prompta uygulanır)</h2><div class="tags">'+rules+'</div>';
  }
  document.readyState==='loading'?document.addEventListener('DOMContentLoaded',init):init();
})();
</script>
</body>
</html>
