<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentor — Forum Kategorisi</title>
<meta name="description" content="Sentor proje belgeleri, özellik açıklamaları, mimari kararlar ve geliştirme notları.">
<meta name="created" content="2026-05-26">
<script src="../../../../.index/pages.js"></script>
<style>
  :root{--bg:#0a0a0a;--surface:#111111;--elevated:#1a1a1a;--subtle:#2a2a2a;--mid:#404040;--ink:#f5f5f5;--dim:#888888;--muted:#555555;--accent:#e07b54;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,sans-serif;line-height:1.6;padding:2rem 1.5rem 4rem;max-width:800px;margin:0 auto}
  a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
  .back{display:inline-block;font-size:.75rem;color:var(--dim);margin-bottom:1.5rem}.back:hover{color:var(--accent)}
  .sf-header{margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--subtle)}
  .sf-icon{font-size:1.6rem;margin-bottom:.4rem;display:block}
  h1{font-size:1.35rem;font-weight:700;margin-bottom:.25rem}
  .sf-desc{font-size:.83rem;color:var(--dim)}
  .search{width:100%;max-width:320px;background:var(--surface);border:1px solid var(--subtle);border-radius:6px;padding:.45rem .8rem;color:var(--ink);font-size:.82rem;font-family:inherit;outline:none;transition:border-color 150ms ease-out;margin-bottom:.75rem}
  .search:focus{border-color:var(--accent)}.search::placeholder{color:var(--muted)}
  .thread-list{display:flex;flex-direction:column;gap:1px;background:var(--subtle);border:1px solid var(--subtle);border-radius:8px;overflow:hidden}
  .thread-row{background:var(--surface);padding:.85rem 1.1rem;display:flex;align-items:baseline;gap:.9rem;transition:background 120ms ease-out}
  .thread-row:hover{background:var(--elevated)}
  .thread-main{flex:1;min-width:0}
  .thread-title{font-size:.86rem;font-weight:600;color:var(--ink);display:block;margin-bottom:.1rem}
  .thread-row:hover .thread-title{color:var(--accent)}
  .thread-desc{font-size:.74rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .thread-date{font-size:.69rem;color:var(--muted);white-space:nowrap;flex-shrink:0}
  .empty{padding:2rem;text-align:center;font-size:.83rem;color:var(--dim);background:var(--surface)}
  .count{font-size:.75rem;color:var(--muted);margin-bottom:.75rem}
  .count span{color:var(--accent);font-weight:600}
</style>
</head>
<body>
<a href="../index.html" class="back">← Forum Ana Sayfa</a>
<div class="sf-header">
  <span class="sf-icon">◈</span>
  <h1>Sentor</h1>
  <p class="sf-desc">Proje tanıtımı, canvas sistemi, vault, AI agent ve MCP belgeleri. Sentor'un nasıl çalıştığına dair tüm konular burada.</p>
</div>
<input class="search" id="search" type="text" placeholder="Bu kategoride ara…" oninput="filterThreads(this.value)" autocomplete="off">
<div class="count" id="count"></div>
<div class="thread-list" id="threadList"><div class="empty">Yükleniyor…</div></div>
<script>
(function(){
  var CAT='sentor';
  var SKIP=new Set(['forum/index','forum/rehber','forum/arch','forum/codeq','forum/dev','forum/feature','forum/sohbet','forum/sentor']);
  function parseCat(d){var m=(d||'').match(/^\[([a-z0-9-]+)\]/);return m?m[1]:null;}
  function cleanDesc(d){return(d||'').replace(/^\[[a-z0-9-]+\]\s*/,'');}
  function esc(s){var e=document.createElement('div');e.textContent=s||'';return e.innerHTML;}
  function fmtDate(s){if(!s)return'';var d=new Date(s);return isNaN(d)?'':d.toLocaleDateString('tr-TR',{day:'numeric',month:'short',year:'numeric'});}
  var pages=[];
  function render(q){
    var list=document.getElementById('threadList');
    var filtered=pages.filter(p=>!q||p.title.toLowerCase().includes(q.toLowerCase())||cleanDesc(p.description).toLowerCase().includes(q.toLowerCase()));
    document.getElementById('count').innerHTML='<span>'+filtered.length+'</span> konu';
    if(!filtered.length){list.innerHTML='<div class="empty">Sonuç bulunamadı.</div>';return;}
    list.innerHTML=filtered.map(p=>{
      var slug=p.id.replace('forum/','');
      return`<a class="thread-row" href="../${slug}/index.html"><div class="thread-main"><span class="thread-title">${esc(p.title)}</span><div class="thread-desc">${esc(cleanDesc(p.description))}</div></div><div class="thread-date">${fmtDate(p.modified||p.created)}</div></a>`;
    }).join('');
  }
  window.filterThreads=function(q){render(q);};
  function init(){
    var idx=window.SENTOR_INDEX;
    if(!idx||!Array.isArray(idx.pages)){document.getElementById('threadList').innerHTML='<div class="empty">Index bulunamadı — <code>python tools/indexer.py</code> çalıştır.</div>';return;}
    pages=idx.pages.filter(p=>p.id&&p.id.startsWith('forum/')&&!SKIP.has(p.id)&&parseCat(p.description)===CAT).sort((a,b)=>new Date(b.modified||b.created||0)-new Date(a.modified||a.created||0));
    render('');
  }
  document.readyState==='loading'?document.addEventListener('DOMContentLoaded',init):init();
})();
</script>
</body>
</html>
