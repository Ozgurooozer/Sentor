<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #111111;
      --elevated: #1a1a1a;
      --subtle:   #2a2a2a;
      --mid:      #404040;
      --ink:      #f5f5f5;
      --dim:      #888888;
      --muted:    #555555;
      --accent:   #5b8def;
      --accent-h: #4a7de0;
      --success:  #3ecf8e;
      --danger:   #e05c5c;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */

    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0 1rem;
      height: 44px;
      border-bottom: 1px solid var(--subtle);
      flex-shrink: 0;
    }

    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
    }

    .status {
      display: flex;
      align-items: center;
      gap: .45rem;
      font-size: 12px;
      color: var(--dim);
      white-space: nowrap;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 150ms ease-out;
    }
    .dot-online  { background: var(--success); }
    .dot-offline { background: var(--danger); }

    .sep { color: var(--muted); }

    .search-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    #search-input {
      width: 100%;
      max-width: 500px;
      background: var(--surface);
      border: 1px solid var(--subtle);
      border-radius: 6px;
      padding: .35rem .75rem;
      font-size: 13px;
      color: var(--ink);
      font-family: inherit;
      outline: none;
      transition: border-color 150ms ease-out;
    }
    #search-input::placeholder { color: var(--muted); }
    #search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(91,141,239,.2);
    }

    /* ── Body ────────────────────────────────────────────────────────────── */

    .body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */

    aside {
      width: 176px;
      flex-shrink: 0;
      border-right: 1px solid var(--subtle);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: .875rem 0;
    }

    .aside-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 .875rem .5rem;
    }
    .aside-label + .aside-label,
    .aside-sep { margin-top: 1.25rem; }

    .cat-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      color: var(--dim);
      font-size: 12.5px;
      font-family: inherit;
      padding: .32rem .875rem;
      cursor: pointer;
      transition: color 150ms ease-out, background 150ms ease-out;
    }
    .cat-btn:hover  { color: var(--ink); background: var(--elevated); }
    .cat-btn.active { color: var(--accent); background: rgba(91,141,239,.08); }

    .aside-link {
      display: block;
      font-size: 12.5px;
      color: var(--dim);
      text-decoration: none;
      padding: .32rem .875rem;
      transition: color 150ms ease-out, background 150ms ease-out;
    }
    .aside-link:hover { color: var(--ink); background: var(--elevated); }

    /* ── Main ────────────────────────────────────────────────────────────── */

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      align-items: center;
      padding: .5rem 1.25rem;
      border-bottom: 1px solid var(--subtle);
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
      min-height: 33px;
    }

    /* ── Offline banner ──────────────────────────────────────────────────── */

    .offline-banner {
      margin: 1.25rem;
      background: var(--surface);
      border: 1px solid var(--subtle);
      border-radius: 6px;
      padding: 1rem 1.25rem;
    }
    .offline-banner.hidden { display: none; }
    .offline-title { font-size: 13px; font-weight: 600; margin-bottom: .35rem; }
    .offline-hint  { font-size: 12px; color: var(--dim); line-height: 1.8; }
    .offline-hint code {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 11.5px;
      background: var(--elevated);
      border: 1px solid var(--subtle);
      border-radius: 3px;
      padding: .1rem .4rem;
      color: var(--accent);
    }

    /* ── Results ─────────────────────────────────────────────────────────── */

    .results {
      flex: 1;
      overflow-y: auto;
      padding: .75rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: .375rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--subtle);
      border-radius: 6px;
      padding: .7rem .9rem;
      cursor: pointer;
      transition: border-color 150ms ease-out, background 150ms ease-out;
    }
    .card:hover { border-color: var(--mid); background: var(--elevated); }

    .card-meta {
      display: flex;
      align-items: center;
      gap: .45rem;
      margin-bottom: .28rem;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      background: rgba(91,141,239,.12);
      color: var(--accent);
      padding: .1rem .4rem;
      border-radius: 3px;
      letter-spacing: .03em;
    }

    .card-id {
      font-size: 11px;
      color: var(--muted);
      font-family: 'Cascadia Code', 'Fira Code', monospace;
    }

    .card-score {
      margin-left: auto;
      font-size: 10px;
      color: var(--muted);
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: .18rem;
    }

    .card-desc {
      font-size: 12px;
      color: var(--dim);
    }

    .empty {
      padding: 3rem 0;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    /* ── Scrollbars ──────────────────────────────────────────────────────── */

    ::-webkit-scrollbar              { width: 5px; }
    ::-webkit-scrollbar-track        { background: transparent; }
    ::-webkit-scrollbar-thumb        { background: var(--subtle); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover  { background: var(--mid); }
  </style>
</head>
<body>

<header>
  <span class="logo">Sentor</span>
  <div class="status">
    <span class="dot" id="status-dot"></span>
    <span id="status-label">connecting</span>
    <span class="sep">·</span>
    <span id="page-count"></span>
  </div>
  <div class="search-wrap">
    <input id="search-input" type="text" placeholder="Search vault  ( / to focus )" autocomplete="off" spellcheck="false">
  </div>
</header>

<div class="body">

  <aside>
    <div class="aside-label">Categories</div>
    <nav id="category-nav"></nav>

    <div class="aside-label aside-sep">Open</div>
    <a class="aside-link" href="index.html">Search UI</a>
    <a class="aside-link" href="../vault/home/start/index.html">Home page</a>
    <a class="aside-link" href="http://localhost:4242/" target="_blank">API ↗</a>
  </aside>

  <main>
    <div class="toolbar">
      <span id="result-count"></span>
    </div>

    <div id="offline-banner" class="offline-banner hidden">
      <div class="offline-title">API not running</div>
      <div class="offline-hint">
        Start with: <code>sentor serve</code> &nbsp;or&nbsp; <code>python api/server.py</code><br>
        Then this panel reconnects automatically.
      </div>
    </div>

    <div id="results" class="results"></div>
  </main>

</div>

<script>
  const API = 'http://localhost:4242';
  const esc = s => String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');

  let allPages    = [];
  let currentCat  = null;
  let searchTimer = null;
  let isOnline    = false;

  // ── API health ──────────────────────────────────────────────────────────────

  async function checkAPI() {
    try {
      const r = await fetch(`${API}/api/categories`, { signal: AbortSignal.timeout(3000) });
      if (!r.ok) throw new Error();
      const cats = await r.json();
      const total = cats.reduce((s, c) => s + c.count, 0);
      setOnline(true, cats, total);
    } catch {
      setOnline(false, [], 0);
    }
  }

  function setOnline(online, cats, total) {
    const dot    = document.getElementById('status-dot');
    const label  = document.getElementById('status-label');
    const count  = document.getElementById('page-count');
    const banner = document.getElementById('offline-banner');

    isOnline = online;

    if (online) {
      dot.className   = 'dot dot-online';
      label.textContent = 'online';
      count.textContent = `${total} page${total !== 1 ? 's' : ''}`;
      banner.classList.add('hidden');
      buildCategoryNav(cats, total);
      if (!allPages.length) loadAllPages();
    } else {
      dot.className   = 'dot dot-offline';
      label.textContent = 'offline';
      count.textContent = '';
      banner.classList.remove('hidden');
      document.getElementById('results').innerHTML = '';
      document.getElementById('result-count').textContent = '';
      allPages = [];
    }
  }

  // ── Categories ──────────────────────────────────────────────────────────────

  function buildCategoryNav(cats, total) {
    const nav = document.getElementById('category-nav');
    nav.innerHTML = '';
    nav.appendChild(makeBtn(`All  (${total})`, null));
    for (const c of cats) nav.appendChild(makeBtn(`${c.name}  (${c.count})`, c.name));
    refreshActiveBtn();
  }

  function makeBtn(label, cat) {
    const btn = document.createElement('button');
    btn.className   = 'cat-btn';
    btn.textContent = label;
    btn.dataset.cat = cat ?? '';
    btn.onclick = () => {
      currentCat = cat;
      refreshActiveBtn();
      const q = document.getElementById('search-input').value.trim();
      q ? doSearch(q) : showAllPages();
    };
    return btn;
  }

  function refreshActiveBtn() {
    document.querySelectorAll('.cat-btn').forEach(b => {
      b.classList.toggle('active', (b.dataset.cat || null) === currentCat);
    });
  }

  // ── All pages (empty-state) ─────────────────────────────────────────────────

  async function loadAllPages() {
    try {
      const r = await fetch(`${API}/api/pages`);
      if (!r.ok) return;
      const data = await r.json();
      allPages = data.pages || [];
      if (!document.getElementById('search-input').value.trim()) showAllPages();
    } catch {}
  }

  function showAllPages() {
    const pages = currentCat ? allPages.filter(p => p.category === currentCat) : allPages;
    document.getElementById('result-count').textContent =
      `${pages.length} page${pages.length !== 1 ? 's' : ''}`;
    renderCards(pages.map(p => ({ ...p, score: null })));
  }

  // ── Search ──────────────────────────────────────────────────────────────────

  async function doSearch(q) {
    const url = `${API}/api/search?q=${encodeURIComponent(q)}&limit=30`
              + (currentCat ? `&category=${encodeURIComponent(currentCat)}` : '');
    try {
      const r = await fetch(url);
      if (!r.ok) return;
      const results = await r.json();
      document.getElementById('result-count').textContent =
        `${results.length} result${results.length !== 1 ? 's' : ''} for "${q}"`;
      renderCards(results);
    } catch {}
  }

  // ── Render ──────────────────────────────────────────────────────────────────

  function renderCards(pages) {
    const el = document.getElementById('results');
    if (!pages.length) {
      el.innerHTML = '<div class="empty">No results.</div>';
      return;
    }
    el.innerHTML = pages.map(p => `
      <div class="card" data-id="${esc(p.id)}">
        <div class="card-meta">
          <span class="badge">${esc(p.category)}</span>
          <span class="card-id">${esc(p.id)}</span>
          ${p.score != null ? `<span class="card-score">score ${p.score}</span>` : ''}
        </div>
        <div class="card-title">${esc(p.title)}</div>
        ${p.description ? `<div class="card-desc">${esc(p.description)}</div>` : ''}
      </div>
    `).join('');
  }

  // Event delegation — card click opens vault page
  document.getElementById('results').addEventListener('click', e => {
    const card = e.target.closest('.card');
    if (!card) return;
    const [cat, slug] = card.dataset.id.split('/');
    window.open(`../vault/${cat}/${slug}/index.html`, '_blank');
  });

  // ── Search input ────────────────────────────────────────────────────────────

  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    const q = e.target.value.trim();
    searchTimer = setTimeout(() => {
      if (!isOnline) return;
      q ? doSearch(q) : showAllPages();
    }, 200);
  });

  // ── Keyboard shortcuts ──────────────────────────────────────────────────────

  document.addEventListener('keydown', e => {
    const input = document.getElementById('search-input');
    if (e.key === '/' && document.activeElement !== input) {
      e.preventDefault();
      input.focus();
    } else if (e.key === 'Escape' && document.activeElement === input) {
      input.value = '';
      input.blur();
      if (isOnline) showAllPages();
    }
  });

  // ── Init ────────────────────────────────────────────────────────────────────

  checkAPI();
  setInterval(checkAPI, 10000);
</script>

</body>
</html>
